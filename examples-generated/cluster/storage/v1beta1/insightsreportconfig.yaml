apiVersion: storage.gcp.upbound.io/v1beta1
kind: InsightsReportConfig
metadata:
  annotations:
    meta.upbound.io/example-id: storage/v1beta1/insightsreportconfig
  labels:
    testing.upbound.io/example-name: config
  name: config
spec:
  forProvider:
    csvOptions:
      delimiter: ','
      headerRequired: false
      recordSeparator: |2+

    displayName: Test Report Config
    frequencyOptions:
      endDate:
        day: 15
        month: 4
        year: 2050
      frequency: WEEKLY
      startDate:
        day: 15
        month: 3
        year: 2050
    location: us-central1
    objectMetadataReportOptions:
      metadataFields:
      - bucket
      - name
      - project
      storageDestinationOptions:
        bucketSelector:
          matchLabels:
            testing.upbound.io/example-name: report_bucket
        destinationPath: test-insights-reports
      storageFilters:
        bucketSelector:
          matchLabels:
            testing.upbound.io/example-name: report_bucket

---

apiVersion: storage.gcp.upbound.io/v1beta2
kind: Bucket
metadata:
  annotations:
    meta.upbound.io/example-id: storage/v1beta1/insightsreportconfig
  labels:
    testing.upbound.io/example-name: report_bucket
  name: report-bucket
spec:
  forProvider:
    forceDestroy: true
    location: us-central1
    uniformBucketLevelAccess: true
