apiVersion: apigee.gcp.upbound.io/v1beta1
kind: EnvironmentKeyvaluemapsEntries
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/environmentkeyvaluemapsentries
  labels:
    testing.upbound.io/example-name: apigee_environment_keyvaluemaps_entries
  name: apigee-environment-keyvaluemaps-entries
spec:
  forProvider:
    envKeyvaluemapIdSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_environment_keyvaluemaps
    value: testValue

---

apiVersion: apigee.gcp.upbound.io/v1beta2
kind: Environment
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/environmentkeyvaluemapsentries
  labels:
    testing.upbound.io/example-name: apigee_environment
  name: apigee-environment
spec:
  forProvider:
    description: Apigee Environment
    displayName: Apigee Environment
    orgIdSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_org

---

apiVersion: apigee.gcp.upbound.io/v1beta1
kind: EnvironmentKeyvaluemaps
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/environmentkeyvaluemapsentries
  labels:
    testing.upbound.io/example-name: apigee_environment_keyvaluemaps
  name: apigee-environment-keyvaluemaps
spec:
  forProvider:
    envIdSelector:
      matchLabels:
        testing.upbound.io/example-name: create_apigee_environment

---

apiVersion: apigee.gcp.upbound.io/v1beta1
kind: Instance
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/environmentkeyvaluemapsentries
  labels:
    testing.upbound.io/example-name: apigee_instance
  name: apigee-instance
spec:
  forProvider:
    location: us-central1
    orgIdSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_org

---

apiVersion: apigee.gcp.upbound.io/v1beta1
kind: InstanceAttachment
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/environmentkeyvaluemapsentries
  labels:
    testing.upbound.io/example-name: apigee_instance_attachment
  name: apigee-instance-attachment
spec:
  forProvider:
    environmentSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_environment
    instanceIdSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_instance

---

apiVersion: apigee.gcp.upbound.io/v1beta2
kind: Organization
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/environmentkeyvaluemapsentries
  labels:
    testing.upbound.io/example-name: apigee_org
  name: apigee-org
spec:
  forProvider:
    analyticsRegion: us-central1
    authorizedNetworkSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_network
    projectId: ${data.google_client_config.current.project}

---

apiVersion: compute.gcp.upbound.io/v1beta1
kind: GlobalAddress
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/environmentkeyvaluemapsentries
  labels:
    testing.upbound.io/example-name: apigee_range
  name: apigee-range
spec:
  forProvider:
    addressType: INTERNAL
    networkSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_network
    prefixLength: 16
    purpose: VPC_PEERING

---

apiVersion: compute.gcp.upbound.io/v1beta1
kind: Network
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/environmentkeyvaluemapsentries
  labels:
    testing.upbound.io/example-name: apigee_network
  name: apigee-network
spec:
  forProvider: {}

---

apiVersion: servicenetworking.gcp.upbound.io/v1beta1
kind: Connection
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/environmentkeyvaluemapsentries
  labels:
    testing.upbound.io/example-name: apigee_vpc_connection
  name: apigee-vpc-connection
spec:
  forProvider:
    networkSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_network
    reservedPeeringRangesRefs:
    - name: apigee_range
    service: servicenetworking.googleapis.com
