apiVersion: apigee.gcp.upbound.io/v1beta1
kind: EnvironmentIAMPolicy
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/environmentiampolicy
  labels:
    testing.upbound.io/example-name: policy
  name: policy
spec:
  forProvider:
    envIdSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_environment
    orgIdSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_environment
    policyData: ${data.google_iam_policy.admin.policy_data}
