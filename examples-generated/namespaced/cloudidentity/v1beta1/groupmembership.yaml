apiVersion: cloudidentity.gcp.m.upbound.io/v1beta1
kind: GroupMembership
metadata:
  annotations:
    meta.upbound.io/example-id: cloudidentity/v1beta1/groupmembership
  labels:
    testing.upbound.io/example-name: cloud_identity_group_membership_basic
  name: cloud-identity-group-membership-basic
  namespace: upbound-system
spec:
  forProvider:
    groupSelector:
      matchLabels:
        testing.upbound.io/example-name: group
    preferredMemberKey:
      id: ${google_cloud_identity_group.child-group.group_key[0].id}
    roles:
    - name: MEMBER

---

apiVersion: cloudidentity.gcp.m.upbound.io/v1beta1
kind: Group
metadata:
  annotations:
    meta.upbound.io/example-id: cloudidentity/v1beta1/groupmembership
  labels:
    testing.upbound.io/example-name: child-group
  name: child-group
  namespace: upbound-system
spec:
  forProvider:
    displayName: my-identity-group-child
    groupKey:
      id: my-identity-group-child@example.com
    labels:
      cloudidentity.googleapis.com/groups.discussion_forum: ""
    parent: customers/A01b123xz

---

apiVersion: cloudidentity.gcp.m.upbound.io/v1beta1
kind: Group
metadata:
  annotations:
    meta.upbound.io/example-id: cloudidentity/v1beta1/groupmembership
  labels:
    testing.upbound.io/example-name: group
  name: group
  namespace: upbound-system
spec:
  forProvider:
    displayName: my-identity-group
    groupKey:
      id: my-identity-group@example.com
    labels:
      cloudidentity.googleapis.com/groups.discussion_forum: ""
    parent: customers/A01b123xz
