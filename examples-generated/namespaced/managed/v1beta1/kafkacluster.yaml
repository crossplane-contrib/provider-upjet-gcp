apiVersion: managed.gcp.m.upbound.io/v1beta1
kind: KafkaCluster
metadata:
  annotations:
    meta.upbound.io/example-id: managed/v1beta1/kafkacluster
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    capacityConfig:
      memoryBytes: 3221225472
      vcpuCount: 3
    gcpConfig:
      accessConfig:
        networkConfigs:
        - subnet: projects/${data.google_project.project.number}/regions/us-central1/subnetworks/default
    labels:
      key: value
    location: us-central1
    rebalanceConfig:
      mode: AUTO_REBALANCE_ON_SCALE_UP
