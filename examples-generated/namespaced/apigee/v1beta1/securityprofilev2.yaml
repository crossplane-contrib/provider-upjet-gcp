apiVersion: apigee.gcp.m.upbound.io/v1beta1
kind: SecurityProfileV2
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/securityprofilev2
  labels:
    testing.upbound.io/example-name: security_profile_v2
  name: security-profile-v2
  namespace: upbound-system
spec:
  forProvider:
    description: terraform test description
    orgIdSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_org
    profileAssessmentConfigs:
    - assessment: auth-policies-check
      weight: MAJOR
    - assessment: mediation-policies-check
      weight: MODERATE
    - assessment: threat-policies-check
      weight: MINOR
    profileId: my-profile

---

apiVersion: apigee.gcp.m.upbound.io/v1beta1
kind: AddonsConfig
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/securityprofilev2
  labels:
    testing.upbound.io/example-name: apigee_org_security_addons_config
  name: apigee-org-security-addons-config
  namespace: upbound-system
spec:
  forProvider:
    addonsConfig:
      apiSecurityConfig:
        enabled: true
    orgSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_org

---

apiVersion: apigee.gcp.m.upbound.io/v1beta1
kind: Organization
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/securityprofilev2
  labels:
    testing.upbound.io/example-name: apigee_org
  name: apigee-org
  namespace: upbound-system
spec:
  forProvider:
    analyticsRegion: us-central1
    authorizedNetworkSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_network
    projectId: ${data.google_client_config.current.project}

---

apiVersion: compute.gcp.m.upbound.io/v1beta1
kind: GlobalAddress
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/securityprofilev2
  labels:
    testing.upbound.io/example-name: apigee_range
  name: apigee-range
  namespace: upbound-system
spec:
  forProvider:
    addressType: INTERNAL
    networkSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_network
    prefixLength: 16
    purpose: VPC_PEERING

---

apiVersion: compute.gcp.m.upbound.io/v1beta1
kind: Network
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/securityprofilev2
  labels:
    testing.upbound.io/example-name: apigee_network
  name: apigee-network
  namespace: upbound-system
spec:
  forProvider: {}

---

apiVersion: servicenetworking.gcp.m.upbound.io/v1beta1
kind: Connection
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/securityprofilev2
  labels:
    testing.upbound.io/example-name: apigee_vpc_connection
  name: apigee-vpc-connection
  namespace: upbound-system
spec:
  forProvider:
    networkSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_network
    reservedPeeringRangesRefs:
    - name: apigee_range
    service: servicenetworking.googleapis.com
