apiVersion: apigee.gcp.m.upbound.io/v1beta1
kind: SecurityAction
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/securityaction
  labels:
    testing.upbound.io/example-name: apigee_security_action
  name: apigee-security-action
  namespace: upbound-system
spec:
  forProvider:
    allow: {}
    conditionConfig:
      botReasons:
      - Flooder
      - Public Cloud Azure
      - Public Cloud AWS
      ipAddressRanges:
      - 100.0.220.1
      - 200.0.0.1
    description: Apigee Security Action
    envIdSelector:
      matchLabels:
        testing.upbound.io/example-name: env
    expireTime: "2025-12-31T23:59:59Z"
    orgIdSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_org
    state: ENABLED

---

apiVersion: apigee.gcp.m.upbound.io/v1beta1
kind: AddonsConfig
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/securityaction
  labels:
    testing.upbound.io/example-name: apigee_org_security_addons_config
  name: apigee-org-security-addons-config
  namespace: upbound-system
spec:
  forProvider:
    addonsConfig:
      apiSecurityConfig:
        enabled: true
    orgSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_org

---

apiVersion: apigee.gcp.m.upbound.io/v1beta1
kind: Environment
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/securityaction
  labels:
    testing.upbound.io/example-name: env
  name: env
  namespace: upbound-system
spec:
  forProvider:
    description: Apigee Environment
    displayName: environment-1
    orgIdSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_org

---

apiVersion: apigee.gcp.m.upbound.io/v1beta1
kind: Organization
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/securityaction
  labels:
    testing.upbound.io/example-name: apigee_org
  name: apigee-org
  namespace: upbound-system
spec:
  forProvider:
    analyticsRegion: us-central1
    authorizedNetworkSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_network
    projectId: ${data.google_client_config.current.project}

---

apiVersion: compute.gcp.m.upbound.io/v1beta1
kind: GlobalAddress
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/securityaction
  labels:
    testing.upbound.io/example-name: apigee_range
  name: apigee-range
  namespace: upbound-system
spec:
  forProvider:
    addressType: INTERNAL
    networkSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_network
    prefixLength: 16
    purpose: VPC_PEERING

---

apiVersion: compute.gcp.m.upbound.io/v1beta1
kind: Network
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/securityaction
  labels:
    testing.upbound.io/example-name: apigee_network
  name: apigee-network
  namespace: upbound-system
spec:
  forProvider: {}

---

apiVersion: servicenetworking.gcp.m.upbound.io/v1beta1
kind: Connection
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/securityaction
  labels:
    testing.upbound.io/example-name: apigee_vpc_connection
  name: apigee-vpc-connection
  namespace: upbound-system
spec:
  forProvider:
    networkSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_network
    reservedPeeringRangesRefs:
    - name: apigee_range
    service: servicenetworking.googleapis.com
