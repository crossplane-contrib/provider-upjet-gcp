apiVersion: apigee.gcp.m.upbound.io/v1beta1
kind: AppGroup
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/appgroup
  labels:
    testing.upbound.io/example-name: apigee_app_group
  name: apigee-app-group
  namespace: upbound-system
spec:
  forProvider:
    channelId: storefront
    channelUri: https://my-dev-portal.org/groups/my-group
    displayName: Test app group
    orgIdSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_org
    status: active

---

apiVersion: apigee.gcp.m.upbound.io/v1beta1
kind: Instance
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/appgroup
  labels:
    testing.upbound.io/example-name: apigee_instance
  name: apigee-instance
  namespace: upbound-system
spec:
  forProvider:
    location: us-central1
    orgIdSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_org
    peeringCidrRange: SLASH_22

---

apiVersion: apigee.gcp.m.upbound.io/v1beta1
kind: Organization
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/appgroup
  labels:
    testing.upbound.io/example-name: apigee_org
  name: apigee-org
  namespace: upbound-system
spec:
  forProvider:
    analyticsRegion: us-central1
    authorizedNetworkSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_network
    projectId: ${data.google_client_config.current.project}

---

apiVersion: compute.gcp.m.upbound.io/v1beta1
kind: GlobalAddress
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/appgroup
  labels:
    testing.upbound.io/example-name: apigee_range
  name: apigee-range
  namespace: upbound-system
spec:
  forProvider:
    addressType: INTERNAL
    networkSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_network
    prefixLength: 16
    purpose: VPC_PEERING

---

apiVersion: compute.gcp.m.upbound.io/v1beta1
kind: Network
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/appgroup
  labels:
    testing.upbound.io/example-name: apigee_network
  name: apigee-network
  namespace: upbound-system
spec:
  forProvider: {}

---

apiVersion: servicenetworking.gcp.m.upbound.io/v1beta1
kind: Connection
metadata:
  annotations:
    meta.upbound.io/example-id: apigee/v1beta1/appgroup
  labels:
    testing.upbound.io/example-name: apigee_vpc_connection
  name: apigee-vpc-connection
  namespace: upbound-system
spec:
  forProvider:
    networkSelector:
      matchLabels:
        testing.upbound.io/example-name: apigee_network
    reservedPeeringRangesRefs:
    - name: apigee_range
    service: servicenetworking.googleapis.com
