apiVersion: firestore.gcp.m.upbound.io/v1beta1
kind: Index
metadata:
  annotations:
    meta.upbound.io/example-id: firestore/v1beta1/index
  labels:
    testing.upbound.io/example-name: my-index
  name: my-index
  namespace: upbound-system
spec:
  forProvider:
    collection: atestcollection
    databaseSelector:
      matchLabels:
        testing.upbound.io/example-name: database
    fields:
    - fieldPath: name
      order: ASCENDING
    - fieldPath: description
      order: DESCENDING
    project: my-project-name

---

apiVersion: firestore.gcp.m.upbound.io/v1beta1
kind: Database
metadata:
  annotations:
    meta.upbound.io/example-id: firestore/v1beta1/index
  labels:
    testing.upbound.io/example-name: database
  name: database
  namespace: upbound-system
spec:
  forProvider:
    deleteProtectionState: DELETE_PROTECTION_DISABLED
    deletionPolicy: DELETE
    locationId: nam5
    name: database-id
    project: my-project-name
    type: FIRESTORE_NATIVE
