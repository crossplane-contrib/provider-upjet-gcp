                          The CacheKeyPolicy for this CdnPolicy.
                          Structure is documented below.
                        properties:
                          includeHost:
                            description: If true requests to different hosts will
                              be cached separately.
                            type: boolean
                          includeNamedCookies:
                            description: Names of cookies to include in cache keys.
                            items:
                              type: string
                            type: array
                          includeProtocol:
                            description: If true, http and https requests will be
                              cached separately.
                            type: boolean
                          includeQueryString:
                            description: |-
                              If true, include query string parameters in the cache key
                              according to query_string_whitelist and
                              query_string_blacklist. If neither is set, the entire query
                              string will be included.
                              If false, the query string will be excluded from the cache
                              key entirely.
                            type: boolean
                          queryStringBlacklist:
                            description: |-
                              Names of query string parameters to exclude in cache keys.
                              All other parameters will be included. Either specify
                              query_string_whitelist or query_string_blacklist, not both.
                              '&' and '=' will be percent encoded and not treated as
                              delimiters.
                            items:
                              type: string
                            type: array
                            x-kubernetes-list-type: set
                          queryStringWhitelist:
                            description: |-
                              Names of query string parameters to include in cache keys.
                              All other parameters will be excluded. Either specify
                              query_string_whitelist or query_string_blacklist, not both.
                              '&' and '=' will be percent encoded and not treated as
                              delimiters.
                            items:
                              type: string
                            type: array
                            x-kubernetes-list-type: set
                        type: object
                      cacheMode:
                        description: |-
                          Specifies the cache setting for all responses from this backend.
                          The possible values are: USE_ORIGIN_HEADERS, FORCE_CACHE_ALL and CACHE_ALL_STATIC
                          Possible values are: USE_ORIGIN_HEADERS, FORCE_CACHE_ALL, CACHE_ALL_STATIC.
                        type: string
                      clientTtl:
                        description: Specifies the maximum allowed TTL for cached
                          content served by this origin.
                        type: number
                      defaultTtl:
                        description: |-
                          Specifies the default TTL for cached content served by this origin for responses
                          that do not have an existing valid TTL (max-age or s-max-age).
                        type: number
                      maxTtl:
                        description: Specifies the maximum allowed TTL for cached
                          content served by this origin.
                        type: number
                      negativeCaching:
                        description: Negative caching allows per-status code TTLs
                          to be set, in order to apply fine-grained caching for common
                          errors or redirects.
                        type: boolean
                      negativeCachingPolicy:
                        description: |-
                          Sets a cache TTL for the specified HTTP status code. negativeCaching must be enabled to configure negativeCachingPolicy.
                          Omitting the policy and leaving negativeCaching enabled will use Cloud CDN's default cache TTLs.
                          Structure is documented below.
                        items:
                          properties:
                            code:
                              description: |-
                                The HTTP status code to define a TTL against. Only HTTP status codes 300, 301, 308, 404, 405, 410, 421, 451 and 501
                                can be specified as values, and you cannot specify a status code more than once.
                              type: number
                          type: object
                        type: array
                      serveWhileStale:
                        description: Serve existing content from the cache (if available)
                          when revalidating content with the origin, or when an error
                          is encountered when refreshing the cache.
                        type: number
                      signedUrlCacheMaxAgeSec:
                        description: |-
                          Maximum number of seconds the response to a signed URL request
                          will be considered fresh, defaults to 1hr (3600s). After this
                          time period, the response will be revalidated before
                          being served.
                          When serving responses to signed URL requests, Cloud CDN will
                          internally behave as though all responses from this backend had a
                          "Cache-Control: public, max-age=[TTL]" header, regardless of any
                          existing Cache-Control header. The actual headers served in
                          responses will not be altered.
                        type: number
                    type: object
                  circuitBreakers:
                    description: |-
                      Settings controlling the volume of connections to a backend service. This field
                      is applicable only when the load_balancing_scheme is set to INTERNAL_MANAGED
                      and the protocol is set to HTTP, HTTPS, HTTP2 or H2C.
                      Structure is documented below.
                    properties:
                      maxConnections:
                        description: |-
                          The maximum number of connections to the backend cluster.
                          Defaults to 1024.
                        type: number
                      maxPendingRequests:
                        description: |-
                          The maximum number of pending requests to the backend cluster.
                          Defaults to 1024.
                        type: number
                      maxRequests:
                        description: |-
                          The maximum number of parallel requests to the backend cluster.
                          Defaults to 1024.
                        type: number
                      maxRequestsPerConnection:
                        description: |-
                          Maximum requests for a single backend connection. This parameter
                          is respected by both the HTTP/1.1 and HTTP/2 implementations. If
                          not specified, there is no limit. Setting this parameter to 1
                          will effectively disable keep alive.
                        type: number
                      maxRetries:
                        description: |-
                          The maximum number of parallel retries to the backend cluster.
                          Defaults to 3.
                        type: number
                    type: object
                  connectionDrainingTimeoutSec:
                    description: |-
                      Time for which instance will be drained (not accept new
                      connections, but still work to finish started).
                    type: number
                  connectionTrackingPolicy:
                    description: |-
                      Connection Tracking configuration for this BackendService.
                      This is available only for Layer 4 Internal Load Balancing and
                      Network Load Balancing.
                      Structure is documented below.
                    properties:
                      connectionPersistenceOnUnhealthyBackends:
                        description: |-
                          Specifies connection persistence when backends are unhealthy.
                          If set to DEFAULT_FOR_PROTOCOL, the existing connections persist on
                          unhealthy backends only for connection-oriented protocols (TCP and SCTP)
                          and only if the Tracking Mode is PER_CONNECTION (default tracking mode)
                          or the Session Affinity is configured for 5-tuple. They do not persist
                          for UDP.
                          If set to NEVER_PERSIST, after a backend becomes unhealthy, the existing
                          connections on the unhealthy backend are never persisted on the unhealthy
                          backend. They are always diverted to newly selected healthy backends
                          (unless all backends are unhealthy).
                          If set to ALWAYS_PERSIST, existing connections always persist on
                          unhealthy backends regardless of protocol and session affinity. It is
                          generally not recommended to use this mode overriding the default.
                          Default value is DEFAULT_FOR_PROTOCOL.
                          Possible values are: DEFAULT_FOR_PROTOCOL, NEVER_PERSIST, ALWAYS_PERSIST.
                        type: string
                      enableStrongAffinity:
                        description: Enable Strong Session Affinity for Network Load
                          Balancing. This option is not available publicly.
                        type: boolean
                      idleTimeoutSec:
                        description: |-
                          Specifies how long to keep a Connection Tracking entry while there is
                          no matching traffic (in seconds).
                          For L4 ILB the minimum(default) is 10 minutes and maximum is 16 hours.
                          For NLB the minimum(default) is 60 seconds and the maximum is 16 hours.
                        type: number
                      trackingMode:
                        description: |-
                          Specifies the key used for connection tracking. There are two options:
                          PER_CONNECTION: The Connection Tracking is performed as per the
                          Connection Key (default Hash Method) for the specific protocol.
                          PER_SESSION: The Connection Tracking is performed as per the
                          configured Session Affinity. It matches the configured Session Affinity.
                          Default value is PER_CONNECTION.
                          Possible values are: PER_CONNECTION, PER_SESSION.
                        type: string
                    type: object
                  consistentHash:
                    description: |-
                      Consistent Hash-based load balancing can be used to provide soft session
                      affinity based on HTTP headers, cookies or other properties. This load balancing
                      policy is applicable only for HTTP connections. The affinity to a particular
                      destination host will be lost when one or more hosts are added/removed from the
                      destination service. This field specifies parameters that control consistent
                      hashing.
                      This field only applies when all of the following are true -
                    properties:
                      httpCookie:
                        description: |-
                          Hash is based on HTTP Cookie. This field describes a HTTP cookie
                          that will be used as the hash key for the consistent hash load
                          balancer. If the cookie is not present, it will be generated.
                          This field is applicable if the sessionAffinity is set to HTTP_COOKIE.
                          Structure is documented below.
                        properties:
                          name:
                            description: Name of the cookie.
                            type: string
                          path:
                            description: Path to set for the cookie.
                            type: string
                          ttl:
                            description: |-
                              Lifetime of the cookie.
                              Structure is documented below.
                            properties:
                              nanos:
                                description: |-
                                  Span of time that's a fraction of a second at nanosecond
                                  resolution. Durations less than one second are represented
                                  with a 0 seconds field and a positive nanos field. Must
                                  be from 0 to 999,999,999 inclusive.
                                type: number
                              seconds:
                                description: |-
                                  Span of time at a resolution of a second.
                                  Must be from 0 to 315,576,000,000 inclusive.
                                type: number
                            type: object
                        type: object
                      httpHeaderName:
                        description: |-
                          The hash based on the value of the specified header field.
                          This field is applicable if the sessionAffinity is set to HEADER_FIELD.
                        type: string
                      minimumRingSize:
                        description: |-
                          The minimum number of virtual nodes to use for the hash ring.
                          Larger ring sizes result in more granular load
                          distributions. If the number of hosts in the load balancing pool
                          is larger than the ring size, each host will be assigned a single
                          virtual node.
                          Defaults to 1024.
                        type: number
                    type: object
                  customMetrics:
                    description: |-
                      List of custom metrics that are used for the WEIGHTED_ROUND_ROBIN locality_lb_policy.
                      Structure is documented below.
                    items:
                      properties:
                        dryRun:
                          description: |-
                            If true, the metric data is collected and reported to Cloud
                            Monitoring, but is not used for load balancing.
                          type: boolean
                        name:
                          description: |-
                            Name of a custom utilization signal. The name must be 1-64 characters
                            long and match the regular expression a-z? which
                            means the first character must be a lowercase letter, and all following
                            characters must be a dash, period, underscore, lowercase letter, or
                            digit, except the last character, which cannot be a dash, period, or
                            underscore. For usage guidelines, see Custom Metrics balancing mode. This
                            field can only be used for a global or regional backend service with the
                            loadBalancingScheme set to EXTERNAL_MANAGED,
                            INTERNAL_MANAGED INTERNAL_SELF_MANAGED.
                          type: string
                      type: object
                    type: array
                  deletionPolicy:
                    description: |-
                      Defaults to DELETE.
                      When set to "DELETE", deleting the resource is allowed.
                    type: string
                  description:
                    description: An optional description of this resource.
                    type: string
                  enableCdn:
                    description: If true, enable Cloud CDN for this RegionBackendService.
                    type: boolean
                  failoverPolicy:
                    description: |-
                      Policy for failovers.
                      Structure is documented below.
                    properties:
                      disableConnectionDrainOnFailover:
                        description: |-
                          On failover or failback, this field indicates whether connection drain
                          will be honored. Setting this to true has the following effect: connections
                          to the old active pool are not drained. Connections to the new active pool
                          use the timeout of 10 min (currently fixed). Setting to false has the
                          following effect: both old and new connections will have a drain timeout
                          of 10 min.
                          This can be set to true only if the protocol is TCP.
                          The default is false.
                        type: boolean
                      dropTrafficIfUnhealthy:
                        description: |-
                          This option is used only when no healthy VMs are detected in the primary
                          and backup instance groups. When set to true, traffic is dropped. When
                          set to false, new connections are sent across all VMs in the primary group.
                          The default is false.
                        type: boolean
                      failoverRatio:
                        description: |-
                          The value of the field must be in [0, 1]. If the ratio of the healthy
                          VMs in the primary backend is at or below this number, traffic arriving
                          at the load-balanced IP will be directed to the failover backend.
                          In case where 'failoverRatio' is not set or all the VMs in the backup
                          backend are unhealthy, the traffic will be directed back to the primary
                          backend in the "force" mode, where traffic will be spread to the healthy
                          VMs with the best effort, or to all VMs when no VM is healthy.
                          This field is only used with l4 load balancing.
                        type: number
                    type: object
                  haPolicy:
                    description: |-
                      Configures self-managed High Availability (HA) for External and Internal Protocol Forwarding.
                      The backends of this regional backend service must only specify zonal network endpoint groups
                      (NEGs) of type GCE_VM_IP. Note that haPolicy is not for load balancing, and therefore cannot
                      be specified with sessionAffinity, connectionTrackingPolicy, and failoverPolicy. haPolicy
                      requires customers to be responsible for tracking backend endpoint health and electing a
                      leader among the healthy endpoints. Therefore, haPolicy cannot be specified with healthChecks.
                      haPolicy can only be specified for External Passthrough Network Load Balancers and Internal
                      Passthrough Network Load Balancers.
                      Structure is documented below.
                    properties:
                      fastIpMove:
                        description: |-
                          Specifies whether fast IP move is enabled, and if so, the mechanism to achieve it.
                          Supported values are:
                        type: string
                      leader:
                        description: |-
                          Selects one of the network endpoints attached to the backend NEGs of this service as the
                          active endpoint (the leader) that receives all traffic.
                          Structure is documented below.
                        properties:
                          backendGroup:
                            description: |-
                              A fully-qualified URL of the zonal Network Endpoint Group (NEG) that the leader is
                              attached to.
                            type: string
                          backendGroupRef:
                            description: Reference to a NetworkEndpointGroup in compute
                              to populate backendGroup.
                            properties:
                              name:
                                description: Name of the referenced object.
                                type: string
                              namespace:
                                description: Namespace of the referenced object
                                type: string
                              policy:
                                description: Policies for referencing.
                                properties:
                                  resolution:
                                    default: Required
                                    description: |-
                                      Resolution specifies whether resolution of this reference is required.
                                      The default is 'Required', which means the reconcile will fail if the
                                      reference cannot be resolved. 'Optional' means this reference will be
                                      a no-op if it cannot be resolved.
                                    enum:
                                    - Required
                                    - Optional
                                    type: string
                                  resolve:
                                    description: |-
                                      Resolve specifies when this reference should be resolved. The default
                                      is 'IfNotPresent', which will attempt to resolve the reference only when
                                      the corresponding field is not present. Use 'Always' to resolve the
                                      reference on every reconcile.
                                    enum:
                                    - Always
                                    - IfNotPresent
                                    type: string
                                type: object
                            required:
                            - name
                            type: object
                          backendGroupSelector:
                            description: Selector for a NetworkEndpointGroup in compute
                              to populate backendGroup.
                            properties:
                              matchControllerRef:
                                description: |-
                                  MatchControllerRef ensures an object with the same controller reference
                                  as the selecting object is selected.
                                type: boolean
                              matchLabels:
                                additionalProperties:
                                  type: string
                                description: MatchLabels ensures an object with matching
                                  labels is selected.
                                type: object
                              namespace:
                                description: Namespace for the selector
                                type: string
                              policy:
                                description: Policies for selection.
                                properties:
                                  resolution:
                                    default: Required
                                    description: |-
                                      Resolution specifies whether resolution of this reference is required.
                                      The default is 'Required', which means the reconcile will fail if the
                                      reference cannot be resolved. 'Optional' means this reference will be
                                      a no-op if it cannot be resolved.
                                    enum:
                                    - Required
                                    - Optional
                                    type: string
                                  resolve:
                                    description: |-
                                      Resolve specifies when this reference should be resolved. The default
                                      is 'IfNotPresent', which will attempt to resolve the reference only when
                                      the corresponding field is not present. Use 'Always' to resolve the
                                      reference on every reconcile.
                                    enum:
                                    - Always
                                    - IfNotPresent
                                    type: string
                                type: object
                            type: object
                          networkEndpoint:
                            description: |-
                              The network endpoint within the leader.backendGroup that is designated as the leader.
                              Structure is documented below.
                            properties:
                              instance:
                                description: |-
                                  The name of the VM instance of the leader network endpoint. The instance must
                                  already be attached to the NEG specified in the haPolicy.leader.backendGroup.
                                type: string
