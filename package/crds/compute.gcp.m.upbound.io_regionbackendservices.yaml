    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: EXTERNAL-NAME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: RegionBackendService is the Schema for the RegionBackendServices
          API. A Region Backend Service defines a regionally-scoped group of virtual
          machines that will serve traffic for load balancing.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RegionBackendServiceSpec defines the desired state of RegionBackendService
            properties:
              forProvider:
                properties:
                  affinityCookieTtlSec:
                    description: |-
                      Lifetime of cookies in seconds if session_affinity is
                      GENERATED_COOKIE. If set to 0, the cookie is non-persistent and lasts
                      only until the end of the browser session (or equivalent). The
                      maximum allowed value for TTL is one day.
                      When the load balancing scheme is INTERNAL, this field is not used.
                    type: number
                  backend:
                    description: |-
                      The set of backends that serve this RegionBackendService.
                      Structure is documented below.
                    items:
                      properties:
                        balancingMode:
                          description: |-
                            Specifies the balancing mode for this backend.
                            See the Backend Services Overview
                            for an explanation of load balancing modes.
                            Default value is UTILIZATION.
                            Possible values are: UTILIZATION, RATE, CONNECTION, CUSTOM_METRICS.
                          type: string
                        capacityScaler:
                          description: |-
                            A multiplier applied to the group's maximum servicing capacity
                            (based on UTILIZATION, RATE or CONNECTION).
                            ~>NOTE: This field cannot be set for
                            INTERNAL region backend services (default loadBalancingScheme),
                            but is required for non-INTERNAL backend service. The total
                            capacity_scaler for all backends must be non-zero.
                            A setting of 0 means the group is completely drained, offering
                            0% of its available Capacity. Valid range is [0.0,1.0].
                          type: number
                        customMetrics:
                          description: |-
                            The set of custom metrics that are used for CUSTOM_METRICS BalancingMode.
                            Structure is documented below.
                          items:
                            properties:
                              dryRun:
                                description: |-
                                  If true, the metric data is collected and reported to Cloud
                                  Monitoring, but is not used for load balancing.
                                type: boolean
                              maxUtilization:
                                description: |-
                                  Optional parameter to define a target utilization for the Custom Metrics
                                  balancing mode. The valid range is [0.0, 1.0].
                                type: number
                              name:
                                description: Name of the cookie.
                                type: string
                            type: object
                          type: array
                        description:
                          description: |-
                            An optional description of this resource.
                            Provide this property when you create the resource.
                          type: string
                        failover:
                          description: |-
                            This field designates whether this is a failover backend. More
                            than one failover backend can be configured for a given RegionBackendService.
                          type: boolean
                        group:
                          description: |-
                            The fully-qualified URL of an Instance Group or Network Endpoint
                            Group resource. In case of instance group this defines the list
                            of instances that serve traffic. Member virtual machine
                            instances from each instance group must live in the same zone as
                            the instance group itself. No two backends in a backend service
                            are allowed to use same Instance Group resource.
                            For Network Endpoint Groups this defines list of endpoints. All
                            endpoints of Network Endpoint Group must be hosted on instances
                            located in the same zone as the Network Endpoint Group.
                            Backend services cannot mix Instance Group and
                            Network Endpoint Group backends.
                            When the load_balancing_scheme is INTERNAL, only instance groups
                            are supported.
                            Note that you must specify an Instance Group or Network Endpoint
                            Group resource using the fully-qualified URL, rather than a
                            partial URL.
                          type: string
                        groupRef:
                          description: Reference to a RegionInstanceGroupManager in
                            compute to populate group.
                          properties:
                            name:
                              description: Name of the referenced object.
                              type: string
                            namespace:
                              description: Namespace of the referenced object
                              type: string
                            policy:
                              description: Policies for referencing.
                              properties:
                                resolution:
                                  default: Required
                                  description: |-
                                    Resolution specifies whether resolution of this reference is required.
                                    The default is 'Required', which means the reconcile will fail if the
                                    reference cannot be resolved. 'Optional' means this reference will be
                                    a no-op if it cannot be resolved.
                                  enum:
                                  - Required
                                  - Optional
                                  type: string
                                resolve:
                                  description: |-
                                    Resolve specifies when this reference should be resolved. The default
                                    is 'IfNotPresent', which will attempt to resolve the reference only when
                                    the corresponding field is not present. Use 'Always' to resolve the
                                    reference on every reconcile.
                                  enum:
                                  - Always
                                  - IfNotPresent
                                  type: string
                              type: object
                          required:
                          - name
                          type: object
                        groupSelector:
                          description: Selector for a RegionInstanceGroupManager in
                            compute to populate group.
                          properties:
                            matchControllerRef:
                              description: |-
                                MatchControllerRef ensures an object with the same controller reference
                                as the selecting object is selected.
                              type: boolean
                            matchLabels:
                              additionalProperties:
                                type: string
                              description: MatchLabels ensures an object with matching
                                labels is selected.
                              type: object
                            namespace:
                              description: Namespace for the selector
                              type: string
                            policy:
                              description: Policies for selection.
                              properties:
                                resolution:
                                  default: Required
                                  description: |-
                                    Resolution specifies whether resolution of this reference is required.
                                    The default is 'Required', which means the reconcile will fail if the
                                    reference cannot be resolved. 'Optional' means this reference will be
                                    a no-op if it cannot be resolved.
                                  enum:
                                  - Required
                                  - Optional
                                  type: string
                                resolve:
                                  description: |-
                                    Resolve specifies when this reference should be resolved. The default
                                    is 'IfNotPresent', which will attempt to resolve the reference only when
                                    the corresponding field is not present. Use 'Always' to resolve the
                                    reference on every reconcile.
                                  enum:
                                  - Always
                                  - IfNotPresent
                                  type: string
                              type: object
                          type: object
                        maxConnections:
                          description: |-
                            The max number of simultaneous connections for the group. Can
                            be used with either CONNECTION or UTILIZATION balancing modes.
                            Cannot be set for INTERNAL backend services.
                            For CONNECTION mode, either maxConnections or one
                            of maxConnectionsPerInstance or maxConnectionsPerEndpoint,
                            as appropriate for group type, must be set.
                          type: number
                        maxConnectionsPerEndpoint:
                          description: |-
                            The max number of simultaneous connections that a single backend
                            network endpoint can handle. Cannot be set
                            for INTERNAL backend services.
                            This is used to calculate the capacity of the group. Can be
                            used in either CONNECTION or UTILIZATION balancing modes. For
                            CONNECTION mode, either maxConnections or
                            maxConnectionsPerEndpoint must be set.
                          type: number
                        maxConnectionsPerInstance:
                          description: |-
                            The max number of simultaneous connections that a single
                            backend instance can handle. Cannot be set for INTERNAL backend
                            services.
                            This is used to calculate the capacity of the group.
                            Can be used in either CONNECTION or UTILIZATION balancing modes.
                            For CONNECTION mode, either maxConnections or
                            maxConnectionsPerInstance must be set.
                          type: number
                        maxRate:
                          description: |-
                            The max requests per second (RPS) of the group. Cannot be set
                            for INTERNAL backend services.
                            Can be used with either RATE or UTILIZATION balancing modes,
                            but required if RATE mode. Either maxRate or one
                            of maxRatePerInstance or maxRatePerEndpoint, as appropriate for
                            group type, must be set.
                          type: number
                        maxRatePerEndpoint:
                          description: |-
                            The max requests per second (RPS) that a single backend network
                            endpoint can handle. This is used to calculate the capacity of
                            the group. Can be used in either balancing mode. For RATE mode,
                            either maxRate or maxRatePerEndpoint must be set. Cannot be set
                            for INTERNAL backend services.
                          type: number
                        maxRatePerInstance:
                          description: |-
                            The max requests per second (RPS) that a single backend
                            instance can handle. This is used to calculate the capacity of
                            the group. Can be used in either balancing mode. For RATE mode,
                            either maxRate or maxRatePerInstance must be set. Cannot be set
                            for INTERNAL backend services.
                          type: number
                        maxUtilization:
                          description: |-
                            Used when balancingMode is UTILIZATION. This ratio defines the
                            CPU utilization target for the group. Valid range is [0.0, 1.0].
                            Cannot be set for INTERNAL backend services.
                          type: number
                      type: object
                    type: array
                  cdnPolicy:
                    description: |-
                      Cloud CDN configuration for this BackendService.
                      Structure is documented below.
                    properties:
