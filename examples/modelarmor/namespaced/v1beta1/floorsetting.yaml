apiVersion: modelarmor.gcp.m.upbound.io/v1beta1
kind: FloorSetting
metadata:
  annotations:
    meta.upbound.io/example-id: modelarmor/v1beta1/floorsetting
  labels:
    testing.upbound.io/example-name: floorsetting-example
  name: uptest-floorsetting-example
  namespace: upbound-system
spec:
  forProvider:
    location: global
    parent: projects/${data.cloudplatform_project.projectId}
    filterConfig:
      raiSettings:
        raiFilters:
          - filterType: DANGEROUS
            confidenceLevel: MEDIUM_AND_ABOVE
          - filterType: HATE_SPEECH
            confidenceLevel: HIGH
      piAndJailbreakFilterSettings:
        filterEnforcement: ENABLED
        confidenceLevel: HIGH
      maliciousUriFilterSettings:
        filterEnforcement: ENABLED
    enableFloorSettingEnforcement: true