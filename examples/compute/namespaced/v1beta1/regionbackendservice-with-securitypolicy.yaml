apiVersion: compute.gcp.m.upbound.io/v1beta1
kind: RegionBackendService
metadata:
  annotations:
    meta.upbound.io/example-id: compute/v1beta2/regionbackendservice
  labels:
    testing.upbound.io/example-name: region-backend-service
  name: region-backend-service
  namespace: upbound-system
spec:
  forProvider:
    connectionDrainingTimeoutSec: 10
    healthChecksRefs:
    - name: region-backend-service
    region: us-central1
    sessionAffinity: CLIENT_IP
    loadBalancingScheme: INTERNAL_MANAGED
    protocol: HTTP
    securityPolicySelector:
      matchLabels:
        testing.upbound.io/example-name: region-sec-policy-basic

---

apiVersion: compute.gcp.m.upbound.io/v1beta1
kind: RegionHealthCheck
metadata:
  annotations:
    meta.upbound.io/example-id: compute/v1beta2/regionbackendservice
  labels:
    testing.upbound.io/example-name: region-backend-service
  name: region-backend-service
  namespace: upbound-system
spec:
  forProvider:
    checkIntervalSec: 1
    region: us-central1
    tcpHealthCheck:
      port: 80
    timeoutSec: 1

---

apiVersion: compute.gcp.m.upbound.io/v1beta1
kind: RegionSecurityPolicy
metadata:
  annotations:
    meta.upbound.io/example-id: compute/v1beta1/regionsecuritypolicy
  labels:
    testing.upbound.io/example-name: region-sec-policy-basic
  name: region-sec-policy-basic
  namespace: upbound-system
spec:
  forProvider:
    region: us-central1
    description: basic region security policy
    type: CLOUD_ARMOR
