apiVersion: networksecurity.gcp.m.upbound.io/v1beta1
kind: DNSThreatDetector
metadata:
  annotations:
    meta.upbound.io/example-id: networksecurity/v1beta1/dnsthreatdetector
  labels:
    testing.upbound.io/example-name: default
  name: default
  namespace: upbound-system
spec:
  forProvider:
    excludedNetworksRefs:
    - name: foobar
    labels:
      foo: bar
    location: global
    threatDetectorProvider: INFOBLOX

---

apiVersion: compute.gcp.m.upbound.io/v1beta1
kind: Network
metadata:
  annotations:
    meta.upbound.io/example-id: networksecurity/v1beta1/dnsthreatdetector
  labels:
    testing.upbound.io/example-name: foobar
  name: foobar
  namespace: upbound-system
spec:
  forProvider:
    autoCreateSubnetworks: false
