apiVersion: redis.gcp.upbound.io/v1beta1
kind: ClusterUserCreatedConnections
metadata:
  annotations:
    meta.upbound.io/example-id: redis/v1beta1/clusterusercreatedconnections
    uptest.upbound.io/timeout: "3600"
    upjet.upbound.io/manual-intervention: |
      This resource needs manually copy the service_attachment values of Redis Cluster to ForwardingRule clusterEndpoints.connections.pscConnection.serviceAttachment.
      Two different index fields of the google_redis_cluster resource must be copied to the same field type in two another items of a list.
      This is not supported for the XP MR references in terms of. By using the high-level abstractions of XP, this can be achieved.
  labels:
    testing.upbound.io/example-name: cluster-user-conn
  name: cluster-user-conn
spec:
  forProvider:
    region: us-central1
    clusterEndpoints:
      - connections:
          - pscConnection:
              addressSelector:
                matchLabels:
                  testing.upbound.io/example-name: ip1_network1
              forwardingRuleSelector:
                matchLabels:
                  testing.upbound.io/example-name: forwarding_rule1_network1
              networkSelector:
                matchLabels:
                  testing.upbound.io/example-name: network1
              projectId: official-provider-testing
              pscConnectionIdSelector:
                matchLabels:
                  testing.upbound.io/example-name: forwarding_rule1_network1
              serviceAttachment: ${google_redis_cluster.cluster-user-conn.psc_service_attachments[0].service_attachment}
          - pscConnection:
              addressSelector:
                matchLabels:
                  testing.upbound.io/example-name: ip2_network1
              forwardingRuleSelector:
                matchLabels:
                  testing.upbound.io/example-name: forwarding_rule2_network1
              networkSelector:
                matchLabels:
                  testing.upbound.io/example-name: network1
              pscConnectionIdSelector:
                matchLabels:
                  testing.upbound.io/example-name: forwarding_rule2_network1
              serviceAttachment: ${google_redis_cluster.cluster-user-conn.psc_service_attachments[1].service_attachment}

---

apiVersion: compute.gcp.upbound.io/v1beta1
kind: Address
metadata:
  annotations:
    meta.upbound.io/example-id: redis/v1beta1/clusterusercreatedconnections
    upjet.upbound.io/manual-intervention: "Root resource skipped"
  labels:
    testing.upbound.io/example-name: ip1_network1
  name: ip1-network1
spec:
  forProvider:
    addressType: INTERNAL
    purpose: GCE_ENDPOINT
    region: us-central1
    subnetworkSelector:
      matchLabels:
        testing.upbound.io/example-name: subnet_network1

---

apiVersion: compute.gcp.upbound.io/v1beta1
kind: Address
metadata:
  annotations:
    meta.upbound.io/example-id: redis/v1beta1/clusterusercreatedconnections
    upjet.upbound.io/manual-intervention: "Root resource skipped"
  labels:
    testing.upbound.io/example-name: ip2_network1
  name: ip2-network1
spec:
  forProvider:
    addressType: INTERNAL
    purpose: GCE_ENDPOINT
    region: us-central1
    subnetworkSelector:
      matchLabels:
        testing.upbound.io/example-name: subnet_network1

---

apiVersion: compute.gcp.upbound.io/v1beta2
kind: ForwardingRule
metadata:
  annotations:
    meta.upbound.io/example-id: redis/v1beta1/clusterusercreatedconnections
    upjet.upbound.io/manual-intervention: "Root resource skipped"
  labels:
    testing.upbound.io/example-name: forwarding_rule1_network1
  name: forwarding-rule1-network1
spec:
  forProvider:
    ipAddressSelector:
      matchLabels:
        testing.upbound.io/example-name: ip1_network1
    loadBalancingScheme: ""
    networkSelector:
      matchLabels:
        testing.upbound.io/example-name: network1
    region: us-central1
    target: ${google_redis_cluster.cluster-user-conn.psc_service_attachments[0].service_attachment}

---

