    loadBalancingScheme: ""
    networkSelector:
      matchLabels:
        testing.upbound.io/example-name: network1
    region: us-central1
    target: ${google_redis_cluster.cluster-user-conn.psc_service_attachments[1].service_attachment}

---

apiVersion: compute.gcp.upbound.io/v1beta1
